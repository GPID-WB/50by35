name: Publish Quarto Book to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out repository (with full history for freeze cache)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Install Quarto
      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "1.5.57"   # pin to a specific stable version

      # 3. Set up R
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4.0"
          use-public-rspm: true

      # 4. Restore R package cache
      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-${{ hashFiles('renv.lock') }}
          restore-keys: ${{ runner.os }}-r-

      # 5. Install R dependencies from renv
      - name: Install R dependencies
        run: |
          install.packages("renv")
          renv::restore()
        shell: Rscript {0}

      # 6. Render the book
      #    Stata is NOT installed on the runner.
      #    All Stata outputs must be frozen locally before pushing.
      #    `freeze: auto` in _quarto.yml ensures frozen outputs are used.
      - name: Render Quarto book
        run: quarto render

      # 7. Deploy to GitHub Pages (publishes the /docs folder)
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
